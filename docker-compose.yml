services:
  vllm:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VLLM_BASE_IMAGE: ${VLLM_BASE_IMAGE:-vllm/vllm-openai:cu129-nightly}
    image: qwen3.6-vllm-local:latest
    container_name: qwen3.6-vllm
    restart: unless-stopped
    runtime: nvidia
    ipc: host
    ports:
      - "${HOST_PORT:-8888}:${PORT:-8888}"
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
      HF_HOME: /root/.cache/huggingface
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-8888}
      MODEL_ID: ${MODEL_ID:-Lorbus/Qwen3.6-27B-int4-AutoRound}
      SERVED_MODEL_NAME: ${SERVED_MODEL_NAME:-qwen3.6-27b-int4-autoround}
      REASONING_PARSER: ${REASONING_PARSER:-qwen3}
      DTYPE: ${DTYPE:-auto}
      MAX_MODEL_LEN: ${MAX_MODEL_LEN:-190484}
      GPU_MEMORY_UTILIZATION: ${GPU_MEMORY_UTILIZATION:-0.85}
      KV_CACHE_DTYPE: ${KV_CACHE_DTYPE:-fp8}
      MTP_TOKENS: ${MTP_TOKENS:-1}
      SPECULATIVE_METHOD: ${SPECULATIVE_METHOD:-mtp}
      MAX_NUM_SEQS: ${MAX_NUM_SEQS:-3}
      MAX_NUM_BATCHED_TOKENS: ${MAX_NUM_BATCHED_TOKENS:-}
      ENABLE_PREFIX_CACHING: ${ENABLE_PREFIX_CACHING:-0}
      ENABLE_CHUNKED_PREFILL: ${ENABLE_CHUNKED_PREFILL:-0}
      ENABLE_AUTO_TOOL_CHOICE: ${ENABLE_AUTO_TOOL_CHOICE:-1}
      TOOL_CALL_PARSER: ${TOOL_CALL_PARSER:-qwen3_coder}
      CHAT_TEMPLATE: ${CHAT_TEMPLATE:-}
      CUDAGRAPH_MODE: ${CUDAGRAPH_MODE:-}
      LIMIT_MM_PER_PROMPT_JSON: ${LIMIT_MM_PER_PROMPT_JSON:-}
      MM_PROCESSOR_CACHE_TYPE: ${MM_PROCESSOR_CACHE_TYPE:-}
      EXTRA_VLLM_ARGS: ${EXTRA_VLLM_ARGS:-}
      VLLM_ALLOW_LONG_MAX_MODEL_LEN: ${VLLM_ALLOW_LONG_MAX_MODEL_LEN:-1}
      VLLM_USE_FLASHINFER_SAMPLER: ${VLLM_USE_FLASHINFER_SAMPLER:-0}
      PYTORCH_CUDA_ALLOC_CONF: ${PYTORCH_CUDA_ALLOC_CONF:-}
      CUDA_DEVICE_MAX_CONNECTIONS: ${CUDA_DEVICE_MAX_CONNECTIONS:-}
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-4}
    volumes:
      - ${HF_CACHE:-./hf-cache}:/root/.cache/huggingface
      - ${VLLM_CACHE:-./vllm-cache}:/root/.cache/vllm
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
