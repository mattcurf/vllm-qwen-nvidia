services:
  vllm:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VLLM_BASE_IMAGE: ${VLLM_BASE_IMAGE}
    image: qwen3.6-vllm-local:latest
    container_name: qwen3.6-vllm
    restart: unless-stopped
    runtime: nvidia
    ipc: host
    ports:
      - "${HOST_PORT}:${PORT}"
    environment:
      HF_TOKEN: ${HF_TOKEN}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
      HF_HOME: /root/.cache/huggingface
      HOST: ${HOST}
      PORT: ${PORT}
      MODEL_ID: ${MODEL_ID}
      SERVED_MODEL_NAME: ${SERVED_MODEL_NAME}
      REASONING_PARSER: ${REASONING_PARSER}
      DTYPE: ${DTYPE}
      MAX_MODEL_LEN: ${MAX_MODEL_LEN}
      GPU_MEMORY_UTILIZATION: ${GPU_MEMORY_UTILIZATION}
      KV_CACHE_DTYPE: ${KV_CACHE_DTYPE}
      MTP_TOKENS: ${MTP_TOKENS}
      SPECULATIVE_METHOD: ${SPECULATIVE_METHOD}
      MAX_NUM_SEQS: ${MAX_NUM_SEQS}
      MAX_NUM_BATCHED_TOKENS: ${MAX_NUM_BATCHED_TOKENS}
      ENABLE_PREFIX_CACHING: ${ENABLE_PREFIX_CACHING}
      ENABLE_CHUNKED_PREFILL: ${ENABLE_CHUNKED_PREFILL}
      ENABLE_AUTO_TOOL_CHOICE: ${ENABLE_AUTO_TOOL_CHOICE}
      TOOL_CALL_PARSER: ${TOOL_CALL_PARSER}
      CUDAGRAPH_MODE: ${CUDAGRAPH_MODE}
      LIMIT_MM_PER_PROMPT_JSON: ${LIMIT_MM_PER_PROMPT_JSON}
      MM_PROCESSOR_CACHE_TYPE: ${MM_PROCESSOR_CACHE_TYPE}
      EXTRA_VLLM_ARGS: ${EXTRA_VLLM_ARGS}
      VLLM_ALLOW_LONG_MAX_MODEL_LEN: ${VLLM_ALLOW_LONG_MAX_MODEL_LEN}
      VLLM_USE_FLASHINFER_SAMPLER: ${VLLM_USE_FLASHINFER_SAMPLER}
      PYTORCH_CUDA_ALLOC_CONF: ${PYTORCH_CUDA_ALLOC_CONF}
      CUDA_DEVICE_MAX_CONNECTIONS: ${CUDA_DEVICE_MAX_CONNECTIONS}
      OMP_NUM_THREADS: ${OMP_NUM_THREADS}
    volumes:
      - ${HF_CACHE}:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
